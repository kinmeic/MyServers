name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/build_app.sh

      - name: Archive app
        run: |
          cd .build/release
          ditto -c -k --sequesterRsrc --keepParent MyServers.app MyServers-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyServers-${{ matrix.arch }}
          path: .build/release/MyServers-${{ matrix.arch }}.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: MyServers-arm64
          path: dist

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: MyServers-x86_64
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: dist/*.zip
          generate_release_notes: true
